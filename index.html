<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make friends</title>
    <!-- นำเข้า Font ยอดฮิตสไตล์ Tech/Modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2=family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- นำเข้า Icon จาก FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #08090c;
            --card-bg: rgba(18, 20, 27, 0.8);
            --text-color: #ffffff;
            --text-muted: #a0aec0;
            --accent-neon: #00ffcc; 
            --accent-pink: #ff007f;
            --accent-purple: #7928ca;
            --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* แก้ไข: เปลี่ยนจาก height เป็น min-height เพื่อให้รองรับหน้าจอมือถือเวลามีการเลื่อนลง */
            padding: 40px 20px;
            overflow-x: hidden; /* แก้ไข: เปลี่ยนจาก overflow: hidden เพื่อให้เลื่อนหน้าจอแนวตั้งได้ โดยที่สติกเกอร์ไม่ล้นออกแนวนอน */
            position: relative;
            
            /* อัปเกรดพื้นหลังใหม่: ฟิกซ์ขนาดให้ครอบคลุมเต็มจอถาวร ไม่แตก ไม่ซ้ำซ้อนตอนเลื่อนลง */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 255, 204, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 20%, rgba(255, 0, 127, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(121, 40, 202, 0.2) 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            
            /* ล็อคพื้นหลังให้อยู่กับที่ (Fix) และไม่ให้เกิดรอยต่อตอนเลื่อนลง */
            background-attachment: fixed;
            background-repeat: no-repeat, no-repeat, no-repeat, repeat, repeat;
        }

        /* --- แสงเลเซอร์วิ่งผ่านหน้าจอ (Neon Light Streaks) --- */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(0, 255, 204, 0.03) 50%, transparent 55%);
            animation: sweep 12s linear infinite;
            pointer-events: none;
        }

        @keyframes sweep {
            0% { transform: translate(-20%, -20%); }
            100% { transform: translate(20%, 20%); }
        }

        /* --- กองทัพสติกเกอร์สไตล์ Gen Z Maximalism --- */
        .bg-sticker {
            position: absolute;
            font-size: 2.8rem;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.2)) drop-shadow(0 4px 6px rgba(0,0,0,0.4));
            animation: floatAround 6s ease-in-out infinite alternate;
        }

        /* จัดวางตำแหน่งสติกเกอร์กระจายทั่วจอ แบบตื้นลึกหนาบาง */
        .st-1 { top: 5%; left: 8%; animation-duration: 5s; font-size: 3.5rem; }
        .st-2 { top: 12%; right: 7%; animation-duration: 7s; animation-delay: 0.5s; }
        .st-3 { top: 40%; left: 4%; animation-duration: 8s; filter: blur(1px); opacity: 0.7; }
        .st-4 { top: 32%; right: 5%; animation-duration: 6s; font-size: 3.2rem; }
        .st-5 { bottom: 25%; left: 6%; animation-duration: 9s; animation-delay: 1s; }
        .st-6 { bottom: 35%; right: 8%; animation-duration: 5.5s; }
        .st-7 { bottom: 5%; left: 12%; animation-duration: 7.5s; font-size: 3.8rem; }
        .st-8 { bottom: 8%; right: 15%; animation-duration: 6.5s; filter: blur(1px); }
        
        /* สติกเกอร์ชิ้นเล็กเน้นหมุน 360 องศา (Spinning Elements) */
        .st-spin {
            animation: spinAround 20s linear infinite;
            font-size: 2rem;
            opacity: 0.8;
        }
        .sp-1 { top: 22%; left: 18%; }
        .sp-2 { top: 60%; right: 18%; }
        .sp-3 { bottom: 18%; left: 25%; }

        @keyframes floatAround {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-20px) rotate(12deg) scale(1.1) skewX(2deg); }
            100% { transform: translateY(15px) rotate(-8deg) scale(0.95); }
        }

        @keyframes spinAround {
            0% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(180deg) translateY(-10px); }
            100% { transform: rotate(360deg) translateY(0); }
        }

        /* --- Main Content Container --- */
        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
            z-index: 10;
        }

        /* --- Header Profile Section --- */
        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 35px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--accent-neon), var(--accent-pink), var(--accent-purple));
        }

        .avatar-wrapper {
            position: relative;
            width: 105px;
            height: 105px;
            margin: 0 auto 18px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-neon);
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.35);
        }

        .status-dot {
            width: 14px;
            height: 14px;
            background-color: var(--accent-neon);
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
            right: 4px;
            border: 3px solid #12141b;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }

        .name {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 40%, var(--accent-neon) 70%, var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio {
            color: var(--text-muted);
            font-size: 14.5px;
            font-weight: 400;
            line-height: 1.6;
        }

        /* --- Link Grid/Buttons Section --- */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .full-width {
            width: 100%;
        }

        .grid-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .link-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 22px;
            padding: 22px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-color);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .link-card i {
            font-size: 28px;
            transition: var(--transition);
        }

        .link-content {
            margin-left: 18px;
        }

        .link-card:not(.full-width) {
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
        }

        .link-card:not(.full-width) .link-content {
            margin-left: 0;
            margin-top: 14px;
        }

        .link-title {
            font-size: 15.5px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .link-desc {
            font-size: 11.5px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .arrow-icon {
            margin-left: auto;
            font-size: 14px !important;
            color: var(--text-muted);
            opacity: 0;
            transform: translateX(-8px);
        }

        /* --- Hover Effects เด้งสู้มือสะใจวัยรุ่น --- */
        .link-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(26, 30, 43, 0.9);
        }

        .link-card.full-width:hover {
            box-shadow: 0 15px 35px rgba(0, 255, 204, 0.18);
            border-color: var(--accent-neon);
        }

        .link-card.full-width:hover i {
            color: var(--accent-neon);
            transform: scale(1.1) rotate(-5deg);
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.8);
        }

        .link-card:not(.full-width):hover {
            box-shadow: 0 15px 35px rgba(255, 0, 127, 0.18);
            border-color: var(--accent-pink);
        }

        .link-card:not(.full-width):hover i {
            transform: scale(1.1) rotate(5deg);
        }
        
        /* คุมโทนแบรนด์สีสะท้อนแสงจัดจ้านเวลา Hover */
        .link-card:hover .fa-line { color: #00ff66; text-shadow: 0 0 15px rgba(0,255,102,0.6); }
        .link-card:hover .fa-instagram { color: #ff007f; text-shadow: 0 0 15px rgba(255,0,127,0.6); }
        .link-card:hover .fa-discord { color: #5865F2; text-shadow: 0 0 15px rgba(88,101,242,0.6); }
        .link-card:hover .fa-facebook { color: #00d2ff; text-shadow: 0 0 15px rgba(0,210,255,0.6); }

        .link-card:hover .arrow-icon {
            opacity: 1;
            transform: translateX(0);
            color: var(--accent-neon);
        }

        /* --- Footer Credit --- */
        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 🎵 --- Gen Z Music Player Widget (ลอยขอบขวาล่าง) --- 🎵 */
        .music-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(18, 20, 27, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: var(--transition);
            cursor: pointer;
            user-select: none;
        }

        .music-player:hover {
            transform: scale(1.05);
            border-color: var(--accent-neon);
            box-shadow: 0 10px 25px rgba(0, 255, 204, 0.2);
        }

        /* แผ่นเสียงหมุนๆ เวลาเล่นเพลง */
        .music-disc {
            width: 32px;
            height: 32px;
            background: linear-gradient(45deg, #111, #333);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent-neon);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            animation: diskRotate 4s linear infinite;
            animation-play-state: paused; /* หยุดหมุนตอนเริ่มต้น */
        }

        .music-disc i {
            font-size: 14px;
            color: var(--accent-neon);
        }

        .music-info {
            display: flex;
            flex-direction: column;
        }

        .music-title {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
        }

        .music-status {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* อนิเมชั่นคลื่นเสียงวิ่งจิ๋วๆ (Audio Wave Visualizer) */
        .wave-container {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 12px;
            margin-left: 5px;
        }

        .wave-bar {
            width: 2px;
            height: 3px;
            background-color: var(--accent-neon);
            border-radius: 1px;
            transition: height 0.2s ease;
        }

        /* คลาสสิกอนิเมชั่นเมื่อเพลงทำงาน */
        .playing .music-disc { animation-play-state: running; }
        .playing .wave-bar:nth-child(1) { animation: pulseWave 0.6s ease infinite alternate; }
        .playing .wave-bar:nth-child(2) { animation: pulseWave 0.9s ease infinite alternate 0.1s; }
        .playing .wave-bar:nth-child(3) { animation: pulseWave 0.4s ease infinite alternate 0.2s; }

        @keyframes diskRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseWave {
            0% { height: 3px; }
            100% { height: 14px; }
        }

        /* ซ่อน Iframe ตัวเล่นของ YouTube ไว้เบื้องหลัง */
        #yt-player {
            position: absolute;
            width: 0;
            height: 0;
            border: 0;
            pointer-events: none;
        }

        /* ปรับดีไซน์ซัพพอร์ตจอมือถือเล็กๆ ไม่ให้ปุ่มทับข้อความ */
        @media (max-width: 480px) {
            .music-player {
                bottom: 15px;
                right: 15px;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ซ่อนระบบเล่นเสียงเบื้องหลังของ YouTube API -->
    <div id="yt-player"></div>

    <!-- 🎵 Gen Z Music Player Widget (ปุ่มเปิด-ปิด ลอยขวาล่าง) 🎵 -->
    <div class="music-player" id="musicWidget" onclick="toggleMusic()">
        <div class="music-disc">
            <i class="fa-solid fa-music"></i>
        </div>
        <div class="music-info">
            <span class="music-title">iluvujayjay - รู้มือ^^</span>
            <span class="music-status" id="trackStatus">Paused</span>
        </div>
        <div class="wave-container">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div> <!-- แก้ไขเอาคลาส wave-row ที่ไม่ได้ใช้งานออก เพื่อความสะอาดของโค้ด -->
            <div class="wave-bar"></div>
        </div>
    </div>

    <!-- ⚡ กองทัพสติกเกอร์ลอยสลับตำแหน่งแบบจุใจเต็มหน้าจอ ⚡ -->
    <div class="bg-sticker st-1">👾</div>
    <div class="bg-sticker st-2">☁️</div>
    <div class="bg-sticker st-3">💖</div>
    <div class="bg-sticker st-4">🎮</div>
    <div class="bg-sticker st-5">🛹</div>
    <div class="bg-sticker st-6">🌈</div>
    <div class="bg-sticker st-7">🦄</div>
    <div class="bg-sticker st-8">🫧</div>
    
    <!-- 🔄 สติกเกอร์ไซส์เล็กสายหมุนควงสว่าน 🔄 -->
    <div class="bg-sticker st-spin sp-1">⚡</div>
    <div class="bg-sticker st-spin sp-2">⭐</div>
    <div class="bg-sticker st-spin sp-3">🪐</div>

    <div class="container">
        
        <!-- ส่วนหัว: โปรไฟล์ของคุณ Bet -->
        <div class="profile-card">
            <div class="avatar-wrapper">
                <img src="https://cdn.phototourl.com/free/2026-06-12-64934f5d-9a7f-4ed3-8c71-03c7eefa624f.jpg" alt="Avatar" class="avatar">
                <div class="status-dot"></div>
            </div>
            <h1 class="name">Bet</h1>
            <p class="bio">Digital Innovation & Marketing ✨<br>รู้จักแล้วจะรักเอง</p>
        </div>

        <!-- ส่วนของลิงก์: ดีไซน์ใหม่ให้เด้งสะใจเวลากด -->
        <div class="links-grid">
            
            <!-- LINE -->
            <a href="https://line.me/ti/p/ld51ifTB1C" target="_blank" class="link-card full-width">
                <i class="fa-brands fa-line"></i>
                <div class="link-content">
                    <div class="link-title">Let's Chat on Line 💬</div>
                    <div class="link-desc">For fast response / work talk</div>
                </div>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </a>

            <!-- Grid Row -->
            <div class="grid-row">
                <!-- Instagram -->
                <a href="https://www.instagram.com/bxtevill/" target="_blank" class="link-card">
                    <i class="fa-brands fa-instagram"></i>
                    <div class="link-content">
                        <div class="link-title">Instagram</div>
                        <div class="link-desc">@bxtevill</div>
                    </div>
                </a>

                <!-- Discord -->
                <a href="https://discord.gg/nY7VVFMqY" target="_blank" class="link-card">
                    <i class="fa-brands fa-discord"></i>
                    <div class="link-content">
                        <div class="link-title">Discord</div>
                        <div class="link-desc">เข้าก็ได้ไม่เข้าก็ได้</div>
                    </div>
                </a>
            </div>

            <!-- Facebook -->
            <a href="https://www.facebook.com/apocalpe.evill" target="_blank" class="link-card full-width">
                <i class="fa-brands fa-facebook"></i>
                <div class="link-content">
                    <div class="link-title">Facebook</div>
                    <div class="link-desc">Apocalpe Evill</div>
                </div>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </a>

        </div>

        <!-- ท้ายเว็บ -->
        <div class="footer">
            © 2026 • Powered by AI
        </div>

    </div>

    <!-- 🔮 ระบบควบคุมเพลง YouTube Background API 🔮 -->
    <script>
        // เรียกใช้งานระบบเล่นเพลงของ YouTube
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0',
                width: '0',
                videoId: 'OG0-w2UtHMI', // ไอดีเพลง เจ็บจนชิน - MEYOU (สามารถเปลี่ยนเป็น ID เพลงอื่นที่ชอบได้เลยครับ)
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'OG0-w2UtHMI' // สั่งเล่นวนซ้ำเพลงเดิม
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // ระบบพร้อมใช้งาน (แต่บราวเซอร์จะบล็อกไม่ให้เปิดเสียงเองจนกว่ายูสเซอร์จะกดคลิกแรก)
        }

        // ฟังก์ชันสลับ เปิด-ปิด เพลงเมื่อคลิกที่ Widget
        function toggleMusic() {
            if (!player) return;
            
            var widget = document.getElementById('musicWidget');
            var statusText = document.getElementById('trackStatus');

            if (!isPlaying) {
                player.playVideo();
                widget.classList.add('playing');
                statusText.innerText = "Playing";
                isPlaying = true;
            } else {
                player.pauseVideo();
                widget.classList.remove('playing');
                statusText.innerText = "Paused";
                isPlaying = false;
            }
        }
    </script>

</body>
</html>
